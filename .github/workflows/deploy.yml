name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
      
      - name: Add Digital Ocean to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DO_SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Deploy to Digital Ocean
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
          MZONE_CLIENT_ID: ${{ secrets.MZONE_CLIENT_ID }}
          MZONE_CLIENT_SECRET: ${{ secrets.MZONE_CLIENT_SECRET }}
          MPROFILER_USERNAME: ${{ secrets.MPROFILER_USERNAME }}
          MPROFILER_PASSWORD: ${{ secrets.MPROFILER_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          # Copy gps-tracker folder contents to server
          ssh $DO_USER@$DO_SERVER_IP "mkdir -p ~/gps-tracker"
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'build' \
            --exclude '.dart_tool' \
            ./gps-tracker/ $DO_USER@$DO_SERVER_IP:~/gps-tracker/
          
          # Create production .env file
          cat > .env << ENVEOF
          # Production Environment Variables
          NODE_ENV=production
          DEBUG=False
          
          # Database Configuration
          POSTGRES_USER=ble_user
          POSTGRES_PASSWORD=hBY1d3jKNwN3iC7zAeNZKaIZjCBPUTkWDhlk2UK5Wq0=
          POSTGRES_DB=ble_tracker
          DATABASE_URL=postgresql://ble_user:hBY1d3jKNwN3iC7zAeNZKaIZjCBPUTkWDhlk2UK5Wq0=@db:5432/ble_tracker
          
          # SendGrid Configuration
          SENDGRID_API_KEY=${SENDGRID_API_KEY}
          FROM_EMAIL=${FROM_EMAIL}
          
          # Redis Configuration
          REDIS_URL=redis://redis:6379/0
          
          # Secret Key for JWT
          SECRET_KEY=${SECRET_KEY}
          
          # MZone API Configuration
          MZONE_CLIENT_ID=${MZONE_CLIENT_ID}
          MZONE_CLIENT_SECRET=${MZONE_CLIENT_SECRET}
          MZONE_API_URL=https://api.mzonetrack.com
          
          # MProfiler Configuration
          MPROFILER_USERNAME=${MPROFILER_USERNAME}
          MPROFILER_PASSWORD=${MPROFILER_PASSWORD}
          ENVEOF
          
          # Copy .env file to server
          scp .env $DO_USER@$DO_SERVER_IP:~/gps-tracker/.env
          
          # Deploy on server
          ssh $DO_USER@$DO_SERVER_IP << 'EOF'
            cd ~/gps-tracker
            
            # Stop and remove existing containers
            docker-compose down
            
            # Start containers with build
            docker-compose up -d --build
            
            # Wait for containers to be healthy
            sleep 15
            
            # Show container status
            docker-compose ps
          EOF
      
      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://${{ secrets.DO_SERVER_IP }}/api/health || exit 1
          echo "✅ Deployment successful!"
