name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
      
      - name: Add Digital Ocean to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DO_SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Deploy to Digital Ocean
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MZONE_CLIENT_SECRET: ${{ secrets.MZONE_CLIENT_SECRET }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          # Copy gps-tracker folder contents to server
          ssh $DO_USER@$DO_SERVER_IP "mkdir -p ~/gps-tracker"
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'backend/.env' \
            --exclude 'build' \
            --exclude '.dart_tool' \
            --exclude 'postgres_data' \
            ./gps-tracker/ $DO_USER@$DO_SERVER_IP:~/gps-tracker/
          
          # Create root .env file for docker-compose
          cat > .env << 'ENVEOF'
          # Database Configuration
          POSTGRES_USER=ble_user
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=ble_tracker
          
          # MZone Configuration (for docker-compose environment section)
          MZONE_CLIENT_SECRET=${MZONE_CLIENT_SECRET}
          ENVEOF
          
          # Substitute environment variables
          sed -i "s|\${POSTGRES_PASSWORD}|${POSTGRES_PASSWORD}|g" .env
          sed -i "s|\${MZONE_CLIENT_SECRET}|${MZONE_CLIENT_SECRET}|g" .env
          
          # Create backend/.env file
          cat > backend.env << 'BACKENDEOF'
          # Database Configuration
          DATABASE_URL=postgresql://ble_user:${POSTGRES_PASSWORD}@db:5432/ble_tracker
          
          # Redis Configuration
          REDIS_URL=redis://redis:6379/0
          
          # JWT Secret Key
          SECRET_KEY=${SECRET_KEY}
          
          # SendGrid Email Configuration
          SENDGRID_API_KEY=${SENDGRID_API_KEY}
          FROM_EMAIL=${FROM_EMAIL}
          
          # MZone API Configuration
          MZONE_API_URL=https://api.myprofiler.com/oauth2/v1
          MZONE_REDIRECT_URI=http://${DO_SERVER_IP}/api/v1/mzone/callback
          MZONE_CLIENT_ID=Tracking_GPS
          MZONE_CLIENT_SECRET=${MZONE_CLIENT_SECRET}
          
          # Optional Settings
          DEBUG=False
          BACKENDEOF
          
          # Substitute environment variables in backend.env
          sed -i "s|\${POSTGRES_PASSWORD}|${POSTGRES_PASSWORD}|g" backend.env
          sed -i "s|\${SECRET_KEY}|${SECRET_KEY}|g" backend.env
          sed -i "s|\${SENDGRID_API_KEY}|${SENDGRID_API_KEY}|g" backend.env
          sed -i "s|\${FROM_EMAIL}|${FROM_EMAIL}|g" backend.env
          sed -i "s|\${DO_SERVER_IP}|${DO_SERVER_IP}|g" backend.env
          sed -i "s|\${MZONE_CLIENT_SECRET}|${MZONE_CLIENT_SECRET}|g" backend.env
          
          # Copy .env files to server
          scp .env $DO_USER@$DO_SERVER_IP:~/gps-tracker/.env
          scp backend.env $DO_USER@$DO_SERVER_IP:~/gps-tracker/backend/.env
          
          # Deploy on server
          ssh $DO_USER@$DO_SERVER_IP << 'EOF'
            cd ~/gps-tracker
            
            # Remove orphaned containers (like mailhog)
            docker-compose down --remove-orphans
            
            # Start containers with build
            docker-compose up -d --build
            
            # Wait for containers to be healthy
            sleep 20
            
            # Show container status
            docker-compose ps
          EOF
      
      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://${{ secrets.DO_SERVER_IP }}/api/health || exit 1
          echo "✅ Deployment successful!"
