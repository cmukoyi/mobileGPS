name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for production deployment'
        required: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: Build Flutter Web App
        run: |
          cd gps-tracker/mobile-app/ble_tracker_app
          flutter pub get
          flutter build web --release --no-tree-shake-icons
          echo "✅ Flutter web build completed"
          ls -lh build/web/main.dart.js
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
      
      - name: Add Digital Ocean to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DO_SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Upload Deployment Scripts
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "📦 Uploading deployment safety scripts..."
          ssh $DO_USER@$DO_SERVER_IP "mkdir -p ~/"
          scp deploy/pre-deployment-backup.sh $DO_USER@$DO_SERVER_IP:~/
          scp deploy/verify-secrets.sh $DO_USER@$DO_SERVER_IP:~/
          scp deploy/rollback-deployment.sh $DO_USER@$DO_SERVER_IP:~/
          ssh $DO_USER@$DO_SERVER_IP "chmod +x ~/pre-deployment-backup.sh ~/verify-secrets.sh ~/rollback-deployment.sh"
          echo "✅ Deployment scripts uploaded and made executable"
      
      - name: Pre-Deployment Backup
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "💾 Creating pre-deployment backup..."
          ssh $DO_USER@$DO_SERVER_IP "~/pre-deployment-backup.sh" || {
            echo "⚠️  Backup script failed but continuing deployment"
          }
          echo "✅ Pre-deployment backup complete"
      
      - name: Deploy to Production
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          # Copy gps-tracker folder to production
          echo "📂 Syncing code to production..."
          ssh $DO_USER@$DO_SERVER_IP "mkdir -p ~/gps-tracker"
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'backend/.env' \
            --exclude '.dart_tool' \
            --exclude 'postgres_data' \
            --exclude 'postgres_data_staging' \
            ./gps-tracker/ $DO_USER@$DO_SERVER_IP:~/gps-tracker/
          
          echo "🚀 Deploying containers..."
          # Deploy on production
          ssh $DO_USER@$DO_SERVER_IP << 'SSHEOF'
            cd ~/gps-tracker
            docker-compose down --remove-orphans
            docker-compose build
            docker-compose up -d
            sleep 20
            docker-compose ps
            echo "=== Production Flutter Web ==="
            docker logs --tail 10 ble_tracker_flutter_web
          SSHEOF
          echo "✅ Containers deployed"
      
      - name: Post-Deployment Verification
        env:
          DO_SERVER_IP: ${{ secrets.DO_SERVER_IP }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          echo "🔍 Verifying secrets and configuration..."
          ssh $DO_USER@$DO_SERVER_IP "~/verify-secrets.sh" || {
            echo "❌ Secret verification failed!"
            echo "🔄 Secrets have been auto-restored from backup"
            echo "⚠️  Review logs above for details"
            exit 1
          }
          echo "✅ Secrets verified successfully"
      
      - name: Health Check
        run: |
          echo "🏥 Checking production health..."
          sleep 5
          curl -f http://${{ secrets.DO_SERVER_IP }}/api/health || exit 1
          echo "✅ Production backend healthy!"
      
      - name: Deployment Summary
        if: always()
        run: |
          echo "================================"
          echo "🚀 Deployment Complete!"
          echo "================================"
          echo "Frontend: https://pinplot.me/"
          echo "Admin: https://pinplot.me/admin/"
          echo "Backend: http://${{ secrets.DO_SERVER_IP }}/api/health"
          echo ""
          echo "📋 Rollback Instructions (if needed):"
          echo "   ssh ${{ secrets.DO_USER }}@${{ secrets.DO_SERVER_IP }}"
          echo "   ~/rollback-deployment.sh"
          echo "================================"
          curl -f -I http://${{ secrets.DO_SERVER_IP }}:3002/ || exit 1
          echo "✅ Production web app responding!"
          curl -f -I https://pinplot.me/ || echo "⚠️ HTTPS check failed"
          echo ""
          echo "🎉 PRODUCTION DEPLOYED!"
          echo "Site: https://pinplot.me/"
          echo "API: https://pinplot.me/api"
      
      - name: Tag Release
        run: |
          TAG="prod-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG" || echo "Could not push tag"
