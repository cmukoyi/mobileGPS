services:
  db:
    image: postgres:15-alpine
    container_name: ble_tracker_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ble_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ble_password}
      POSTGRES_DB: ${POSTGRES_DB:-ble_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ble_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ble_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ble_tracker_backend
    env_file:
      - ./backend/.env
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ble_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  admin:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: ble_tracker_admin
    ports:
      - "3000:3000"
    volumes:
      - ./admin-dashboard:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - ble_network
    command: npm start

  customer:
    build:
      context: ./customer-dashboard
      dockerfile: Dockerfile
    container_name: ble_tracker_customer
    ports:
      - "3001:3001"
    volumes:
      - ./customer-dashboard:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - ble_network
    command: npm start

  flutter-web:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    container_name: ble_tracker_flutter_web
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - ble_network

  nginx:
    image: nginx:alpine
    container_name: ble_tracker_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - admin
      - flutter-web
    networks:
      - ble_network

volumes:
  postgres_data:

networks:
  ble_network:
    driver: bridge
